<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Brick Portfolio</title>
    <!-- โหลด React และ Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- ส่วนนี้คือการนำโค้ด React ที่เราออกแบบไว้มาใส่ ---
        const { useState, useEffect } = React;

        // นำโค้ด App.jsx ที่ผมเคยเขียนให้ยาวๆ มาวางต่อตรงนี้ได้เลยครับ 
        // หรือจะลองใช้เวอร์ชันสรุปสั้นๆ นี้เพื่อเช็คการแสดงผลก่อน:
        function App() {
            return (
                <div className="min-h-screen bg-slate-50">
                    <nav className="bg-slate-900 text-white p-6 border-b-4 border-[#C15433]">
                        <h1 className="text-2xl font-bold tracking-widest text-center">DOUBLE BRICK PORTFOLIO</h1>
                    </nav>
                    
                    <main className="max-w-4xl mx-auto p-8 text-center">
                        <div className="bg-white p-10 rounded-xl shadow-2xl">
                            <h2 className="text-4xl font-black text-slate-800 mb-4 italic uppercase">Industrial Management</h2>
                            <p className="text-slate-500 mb-8">Engineering Materials ENG-203 Project</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="p-4 border-2 border-slate-100 rounded-lg hover:border-[#C15433] transition-colors">
                                    <h3 className="font-bold text-[#C15433]">1. Process Map</h3>
                                    <img src="1.jpg" className="w-full h-auto mt-2 rounded" alt="Process" />
                                </div>
                                <div className="p-4 border-2 border-slate-100 rounded-lg hover:border-[#C15433] transition-colors">
                                    <h3 className="font-bold text-[#C15433]">2. Quality Control</h3>
                                    <img src="2.jpg" className="w-full h-auto mt-2 rounded" alt="Quality" />
                                </div>
                            </div>

                            <div className="mt-8 p-6 bg-slate-900 rounded-lg text-white">
                                <h3 className="text-amber-400 font-bold">✨ AI Lab Status: Online</h3>
                                <p className="text-sm mt-2 opacity-70">ระบบกำลังวิเคราะห์ข้อมูลจากภาพเพื่อสร้างรายงานวิศวกรรม...</p>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
